spring:
  application:
    name: nexpath-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexpath}
    username: postgres
    password: Husain@787
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update   # ⚠️ change to validate in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

# ===============================
# SERVER
# ===============================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ===============================
# JWT CONFIG
# ===============================
jwt:
  secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3Itand0LXNpZ25pbmc=}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# AI CONFIG (OPENROUTER)
# ===============================
openrouter:
  api-key: ${OPENROUTER_API_KEY}

# ===============================
# REDIS
# ===============================
redis:
  url: ${REDIS_URL:redis://localhost:6379}
  timeout: 60000

# ===============================
# KAFKA
# ===============================
kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  producer:
    value-serializer: org.apache.kafka.common.serialization.StringSerializer

# ===============================
# CLOUDINARY
# ===============================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# ===============================
# RAZORPAY
# ===============================
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}

# ===============================
# LOGGING
# ===============================
logging:
  level:
    root: INFO
    com.nexpath: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

# ===============================
# ACTUATOR
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized