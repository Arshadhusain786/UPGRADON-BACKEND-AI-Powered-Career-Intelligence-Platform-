app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  ai:
    provider: ${AI_PROVIDER:openrouter}  # openrouter | ollama
    embedding-enabled: ${EMBEDDING_ENABLED:false}  # set true when pgvector ready
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}

# ── Spring AI — OpenRouter (via OpenAI-compatible endpoint) ──────────────────
spring:
  application:
    name: nexpath-backend

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexpath}
    username: postgres
    password: ${DB_PASSWORD}   # ✅ FIXED

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: google/gemini-2.0-flash-001
          temperature: 0.7
          max-tokens: 2000


# ── File Upload ───────────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── Caching ───────────────────────────────────────────────────────────────────
  cache:
    type: simple

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}